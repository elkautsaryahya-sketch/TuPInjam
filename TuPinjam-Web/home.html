<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKBlwXashCr76gEsH_b0w8FD-BJKosQ90",
  authDomain: "tupinjam-39c42.firebaseapp.com",
  projectId: "tupinjam-39c42",
  storageBucket: "tupinjam-39c42.appspot.com",
  messagingSenderId: "410564688322",
  appId: "1:410564688322:web:187157e3a6a52567f83e5b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);



// 📥 Ambil stok dari Firestore
async function loadHome() {
  const alatRef = doc(db, "alat", "stok");
  const snap = await getDoc(alatRef);

  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("stok-proyektor").innerText =
    "Tersedia = " + data.proyektor;

  document.getElementById("stok-hdmi").innerText =
    "Tersedia = " + data.hdmi;

  document.getElementById("stok-kabel").innerText =
    "Tersedia = " + data.kabel;

  document.getElementById("stok-laptop").innerText =
    "Tersedia = " + data.laptop;
}

// 📦 Pinjam alat
window.konfirmasiPinjam = async function(alatKey) {
  const alatRef = doc(db, "alat", "stok");
  const snap = await getDoc(alatRef);

  if (!snap.exists()) return;

  const data = snap.data();

  if (data[alatKey] <= 0) {
    alert("Stok habis!");
    return;
  }

  await updateDoc(alatRef, {
    [alatKey]: data[alatKey] - 1
  });

  alert("Berhasil meminjam");
  loadHome();
}
</script>
