<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKBlwXashCr76gEsH_b0w8FD-BJKosQ90",
  authDomain: "tupinjam-39c42.firebaseapp.com",
  projectId: "tupinjam-39c42",
  storageBucket: "tupinjam-39c42.firebasestorage.app",
  messagingSenderId: "410564688322",
  appId: "1:410564688322:web:187157e3a6a52567f83e5b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔒 Proteksi halaman
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadHome();
  }
});

// 📥 Ambil stok dari Firestore
async function loadHome() {
  const alatRef = doc(db, "alat", "stok");
  const snap = await getDoc(alatRef);

  if (!snap.exists()) return;

  const data = snap.data();

  setStok("proyektor", data.proyektor);
  setStok("hdmi", data.hdmi);
  setStok("kabel", data.kabel);
  setStok("laptop", data.laptop);
}

function setStok(id, jumlah) {
  const el = document.getElementById("stok-" + id);
  el.innerText = "Tersedia = " + jumlah;

  if (jumlah <= 0) {
    el.style.background = "#ff4d4d";
    el.style.color = "white";
  } else if (jumlah <= 2) {
    el.style.background = "#ffc107";
    el.style.color = "black";
  } else {
    el.style.background = "#28a745";
    el.style.color = "white";
  }

  el.style.padding = "4px 10px";
  el.style.borderRadius = "20px";
  el.style.display = "inline-block";
}
</script>
