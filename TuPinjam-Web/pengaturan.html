<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pengaturan | TuPinjam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

  <div class="container">

    <!-- PROFILE CARD -->
    <div class="card profile-card">
      <h2>Profil Saya</h2>

      <div class="profile-item">
        <span>Nama</span>
        <strong id="showNama">...</strong>
      </div>

      <div class="profile-item">
        <span>Kelas</span>
        <strong id="showKelas">...</strong>
      </div>

      <div class="profile-item">
        <span>NIS</span>
        <strong id="showNis">...</strong>
      </div>

      <button id="btnLogout" class="btn-danger">
        Logout
      </button>
    </div>

  </div>


  <!-- NAVBAR -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-link">
      <div class="nav">🏠<span>Home</span></div>
    </a>
    <a href="dipinjam.html" class="nav-link">
      <div class="nav">📦<span>Dipinjam</span></div>
    </a>
    <a href="riwayat.html" class="nav-link">
      <div class="nav">🕒<span>Riwayat</span></div>
    </a>
    <a href="pengaturan.html" class="nav-link">
      <div class="nav active">⚙️<span>Pengaturan</span></div>
    </a>
  </nav>


  <!-- FIREBASE SCRIPT -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBKBlwXashCr76gEsH_b0w8FD-BJKosQ90",
  authDomain: "tupinjam-39c42.firebaseapp.com",
  projectId: "tupinjam-39c42",
  storageBucket: "tupinjam-39c42.firebasestorage.app",
  messagingSenderId: "410564688322",
  appId: "1:410564688322:web:187157e3a6a52567f83e5b"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // cek user login
    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const uid = user.uid;
      const snap = await getDoc(doc(db, "users", uid));

      if (!snap.exists()) {
        window.location.href = "index.html";
        return;
      }

      const data = snap.data();

      document.getElementById("showNama").innerText = data.nama;
      document.getElementById("showKelas").innerText = data.kelas;
      document.getElementById("showNis").innerText = data.nis;
    });

    // logout
    document.getElementById("btnLogout").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

  </script>

</body>
</html>
