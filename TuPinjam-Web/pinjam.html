<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pinjam Alat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

<div class="pinjam-container">

    <div class="pinjam-header">
        <button class="back-btn" onclick="history.back()">←</button>
        <h3>Pinjam Alat</h3>
    </div>

    <div class="alat-preview">
        <div>
            <h2 id="alatNama"></h2>
            <span id="alatStok" class="stok"></span>
        </div>
    </div>

    <label>Nama Peminjam</label>
    <input type="text" id="inputNama" class="form-input">

    <label>Kelas</label>
    <input type="text" id="inputKelas" class="form-input">

    <label>Tanggal Pinjam</label>
    <input type="date" id="inputTanggal" class="form-input">

    <button class="btn-konfirmasi" id="btnKonfirmasi">
        Konfirmasi
    </button>

</div>
<script type="module" src="js/pinjam.js"></script>

</body>
</html>
